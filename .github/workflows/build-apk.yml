name: Build APK — La Italiana

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:          # permite ejecutar manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Código fuente ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      # ── 4. Dependencias ───────────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 5. Reconstruir keystore desde secret ─────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/la-italiana-keystore.jks

      # ── 6. Crear key.properties ───────────────────────────────────────────
      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=la-italiana-keystore.jks
          EOF

      # ── 7. Compilar APK release firmado ──────────────────────────────────
      - name: Build APK release
        run: |
          flutter build apk --release \
            --split-per-abi \
            --dart-define=FLUTTER_WEB_USE_SKIA=true

      # ── 8. Subir APK como artefacto ───────────────────────────────────────
      - name: Upload APK arm64 (recomendado para cel moderno)
        uses: actions/upload-artifact@v4
        with:
          name: la-italiana-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload APK armeabi (cel antiguo)
        uses: actions/upload-artifact@v4
        with:
          name: la-italiana-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Upload APK universal
        uses: actions/upload-artifact@v4
        with:
          name: la-italiana-universal
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30