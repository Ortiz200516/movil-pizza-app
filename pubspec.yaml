name: pizzeria_app
description: "La Pizzería - App de gestión de pedidos"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core:            ^4.3.0
  cloud_firestore:          ^6.1.1
  firebase_auth:            ^6.1.3
  firebase_messaging:       ^16.1.0
  firebase_storage:         ^13.0.5

  # Maps
  google_maps_flutter:      ^2.9.0
  google_maps_flutter_web:  ^0.5.10

  # Estado
  provider:                 ^6.1.2

  # Utilidades
  shared_preferences:       ^2.3.2
  intl:                     ^0.20.2

  # Perfil - foto y galería
  image_picker:             ^1.1.2
  cached_network_image:     ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:            ^6.0.0
  flutter_launcher_icons:   ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/icon/icon.png"
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/