name: pizzeria_app
description: "La Pizzería - App de gestión de pedidos"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core:            ^4.3.0
  cloud_firestore:          ^6.1.1
  firebase_auth:            ^6.1.3
  firebase_messaging: 16.1.0   # FCM para web via JS SDK

  # Maps (web)
  google_maps_flutter:      ^2.9.0
  google_maps_flutter_web:  ^0.5.10

  # Estado
  provider:            ^6.1.2

  # Utilidades
  intl:                ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true