name: movil_pizza_app
description: La Italiana — App de Pizzería Artesanal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ────────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # ── Notificaciones locales ───────────────────────────────────────────────────
  flutter_local_notifications: ^18.0.1

  # ── Mapas y ubicación ───────────────────────────────────────────────────────
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1

  # ── UI / UX ─────────────────────────────────────────────────────────────────
  provider: ^6.1.2
  shared_preferences: ^2.3.2

  # ── Multimedia ───────────────────────────────────────────────────────────────
  image_picker: ^1.1.2

  # ── Links externos ───────────────────────────────────────────────────────────
  url_launcher: ^6.3.0

  # ── Íconos ───────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

# ── Configuración ícono de app ──────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"

flutter:
  uses-material-design: true

  # Agrega aquí tus assets si tienes imágenes locales
  # assets:
  #   - assets/icon/icon.png
  #   - assets/icon/icon_fg.png
  #   - assets/images/