<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">

  <!-- Fondo oscuro -->
  <rect width="1024" height="1024" rx="220" fill="#0F172A"/>

  <!-- Resplandor naranja suave en el centro -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="220" fill="url(#glow)"/>

  <!-- Gradiente dorado para la pizza -->
  <radialGradient id="pizzaGrad" cx="40%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#FBBF24"/>
    <stop offset="60%" stop-color="#D97706"/>
    <stop offset="100%" stop-color="#92400E"/>
  </radialGradient>

  <!-- Base de la pizza (masa) -->
  <circle cx="512" cy="480" r="300" fill="url(#pizzaGrad)"/>

  <!-- Borde exterior (crust) -->
  <circle cx="512" cy="480" r="300" fill="none" stroke="#F59E0B" stroke-width="44"/>

  <!-- Salsa de tomate -->
  <circle cx="512" cy="480" r="254" fill="#DC2626" fill-opacity="0.55"/>

  <!-- Queso -->
  <circle cx="512" cy="480" r="254" fill="#FDE68A" fill-opacity="0.45"/>

  <!-- Líneas de corte -->
  <g stroke="#92400E" stroke-width="5" stroke-opacity="0.4">
    <line x1="512" y1="180" x2="512" y2="780"/>
    <line x1="252" y1="330" x2="772" y2="630"/>
    <line x1="772" y1="330" x2="252" y2="630"/>
  </g>

  <!-- Pepperoni (círculos rojos decorativos) -->
  <circle cx="512" cy="360" r="34" fill="#B91C1C" stroke="#7F1D1D" stroke-width="4"/>
  <circle cx="395" cy="510" r="28" fill="#B91C1C" stroke="#7F1D1D" stroke-width="3"/>
  <circle cx="630" cy="510" r="28" fill="#B91C1C" stroke="#7F1D1D" stroke-width="3"/>
  <circle cx="512" cy="600" r="24" fill="#B91C1C" stroke="#7F1D1D" stroke-width="3"/>
  <circle cx="445" cy="425" r="20" fill="#B91C1C" stroke="#7F1D1D" stroke-width="2"/>
  <circle cx="585" cy="430" r="20" fill="#B91C1C" stroke="#7F1D1D" stroke-width="2"/>

  <!-- Nombre del restaurante -->
  <text x="512" y="860"
        font-family="Arial, sans-serif"
        font-size="68"
        font-weight="900"
        fill="#FF6B00"
        text-anchor="middle"
        letter-spacing="5">LA ITALIANA</text>

</svg>